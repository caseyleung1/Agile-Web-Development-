<!DOCTYPE html>
<html lang="en">

  <head>
    <!-- Responsive adjustment for a website -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
  </head>

  <body>

    <div class="top_bar">
      <div class="user_profile">
        <img src="default.png" alt="Profile Picture">
        <h1>Lynn Ta</h1>
      </div>
    </div>

    <div class="page_layout">

      <div class="side_bar">

        <div class="dashboard_link">
          <a href="dashboard.html">Dashboard</a>
        </div>

        <div class="study_sets_link">
          <a href="my-study-sets.html">My Study Sets</a>
        </div>

        <div class="search_link">
          <a href="search.html">Search</a>
        </div>

        <div class="create_set_link">
          <a href="create-new-set.html">Create New Set</a>
        </div>

        <div class="analytics_link">
          <a href="analytics.html">Analytics</a>
        </div>

        <div class="settings_link">
          <a href="settings.html">Settings</a>
        </div>

        <div class="profile_link">
          <a href="profile.html">Profile</a>
        </div>

      </div>

      <div class="settings_page">

        <div class="settings_header">
          <h1>Settings</h1>
          <p>Manage your account</p>
        </div>

        <div class="account_settings">
          <h2>Account</h2>

          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="abcxyz...">

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="a@gmail.com">
        </div>

        <div class="notification_settings">
          <h2>Notifications</h2>

          <input type="checkbox" id="study_reminder" name="study_reminder">
          <label for="study_reminder">Study reminder</label>

          <input type="checkbox" id="daily_goal" name="daily_goal">
          <label for="daily_goal">Daily goal notifications</label>

          <input type="checkbox" id="friend_activities" name="friend_activities">
          <label for="friend_activities">Friend activities</label>

          <input type="checkbox" id="new_study_set_updates" name="new_study_set_updates">
          <label for="new_study_set_updates">New study set updates</label>
        </div>

        <div class="language_settings">
          <h2>Language</h2>

          <select id="language" name="language">
            <option value="english">English</option>
            <option value="vietnamese">Vietnamese</option>
            <option value="french">French</option>
            <option value="spanish">Spanish</option>
          </select>
        </div>

      </div>

    </div>

  </body>

</html>
