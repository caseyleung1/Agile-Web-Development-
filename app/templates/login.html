<!DOCTYPE html>
<html lang="en">

  <head>
    <!-- Responsive adjustment for a website -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
  </head>

  <body>

    <div class="login_page">

      <div class="login_image">
        <img src="login-left.png" alt="Study materials with headphones">
      </div>

      <div class="login_form">

        <h1>Welcome Back</h1>

        <div class="social_login">
          <button type="button">Login with Gmail</button>
          <button type="button">Login with Facebook</button>
          <button type="button">Login with Apple</button>
        </div>

        <div class="divider">
          <p>Or</p>
        </div>

        <form>

          <div class="email_input">
            <label for="email">Email</label>
            <input type="text" id="email" name="email" placeholder="Enter your email or username">
          </div>

          <div class="password_input">
            <label for="password">Password</label>
            <a href="#">Forget password?</a>
            <input type="password" id="password" name="password" placeholder="Enter your password">
          </div>

          <button type="submit">Log in</button>

        </form>

        <div class="sign_up">
          <p>Dont have an account? <a href="register.html">Sign up</a></p>
        </div>

      </div>

    </div>

  </body>

</html>
