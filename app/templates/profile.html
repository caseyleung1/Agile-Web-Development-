<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Responsive adjustment for a website -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Profile </title>
        <link rel="stylesheet" href="profilestyle.css">
    </head>
    <body>

        <div class="main-content">

            <div class="profile">
                <img src="default.jpg" alt="Profile Picture">
                <div class="profile-info">
                    <h2> User Name </h2>
                </div>
        </div>

        <div class="analytics-container">
            <div class="stat-card">
            <h2> Number Cards </h2><h3> Cards Study</h3>
            </div>
            <div class="stat-card">
            <h2> Number Days </h2><h3> Study Streak</h3>
            </div>
            <div class="stat-card">
            <h2> Numbers Achievements</h2><h3> Achievement</h3>
            </div>
        </div>

        <div class="study-set-container">
            <h2> My Study Sets</h2>

            <div class="study-item">
                <h2> Title Set </h2>
                <h3> Description </h3>
            </div>
        </div>
    </div>
    </body>
</html>
