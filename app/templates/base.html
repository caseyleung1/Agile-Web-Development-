<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}StudyFlash{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                purple: '#8A3FFC',
                purpledeep: '#5B21B6',
                orange: '#FF7648',
                sky: '#45B5F5'
              }
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="fixed right-4 top-4 z-50 space-y-2">
          {% for category, message in messages %}
            <div
              class="rounded-lg px-4 py-2 text-sm shadow-lg {% if category == 'error' %}bg-red-600 text-white{% elif category == 'success' %}bg-emerald-600 text-white{% else %}bg-slate-800 text-white{% endif %}"
            >
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block main %}{% endblock %}
    {% block scripts %}{% endblock %}
  </body>
</html>
