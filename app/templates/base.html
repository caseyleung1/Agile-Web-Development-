<!doctype html>
<!-- All pages inherits from this file (header, sidebar, and layout) -->
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}Study Dashboard{% endblock %}</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    </head>
    <body>
        <header class="site-header">
            <a class="brand" href="{{ url_for('main.index') }}">Study Dashboard</a>
            <nav class="auth-actions" aria-label="Authentication">
                <a class="button button-secondary" href="#">Sign In</a>
                <a class="button" href="#">Sign Up</a>
            </nav>
        </header>

        <div class="page-layout">
            <aside class="left-sidebar" aria-label="Primary navigation">
                <a class="nav-item active" href="#">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="fa-solid fa-book"></i>
                    <span>My Study Sets</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>Search</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="fa-solid fa-plus"></i>
                    <span>Create New Set</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="fa-solid fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a class="nav-item" href="#">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </a>
            </aside>

            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </body>
</html>
