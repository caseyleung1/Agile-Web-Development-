<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Responsive adjustment for a website -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Register</title>
    
    </head>
    <body>
        <div class="content">
            <h1>Create your account</h1>
            <h2>Start your learning with us</h2>
            <!-- User form to routing a register URL to receive response from server -->
            <form action="register.html" method="post">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required><br><br>

                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required><br><br>

                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the</label> 
                <a href="terms.html" class="text-purple-600 font-medium">Terms and Conditions</a><br><br>
                
                <button type="submit">Create Account</button>

                <p> Already have an account? </p> <a href="login.html">Sign In</a>
            </form>
        </div>
    </body>
</html>
