<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Study Set</title>
    <link rel="stylesheet" href="createss.css">
</head>
<body>
    <div class = 'container'>

        <button type = 'button' class = 'btn-back'> Back to Dashboard</button>

        <header>
            <h1> Create New Study Set</h1>
            <p> Build your own custom flashcard set</p>
        </header>

        <form action = '/create' method = 'POST'>
            <div class = 'card-section'>
                <label for = 'title'>Set Title</label>
                <input type = 'text' id = 'title' name = 'title' placeholder = 'e.g. Biology 101' required>

                <label for = 'description'>Description</label>
                <textarea id = 'description' name = 'description' placeholder = 'Brief description of the study set' rows = '3'></textarea>
            </div>

            <!-- AI generator part, not finalised yet-->

            <div class = 'card-section ai-bg'>
                <div class = 'ai-header'>
                    <span class = 'icon> ✨</span>'
                    <h3> AI Flashcard Generator</h3>
                </div>
                <textarea name = 'ai-input' placeholder = 'Enter a topic or text and let AI generate flashcards for you!' rows = '4'></textarea>
                <p class = 'hint'> e.g. paste notes to generate</p>
                <button type = 'button' class = 'btn-ai'>Generate Flashcards</button>
            </div>

            <div id = 'questions-list'>
                <div class = 'card-section question-block'>
                    <h3> Question 1</h3>

                    <label> Term </label>
                    <input type = 'text' name = 'term' placeholder = 'Enter the term' required>

                    <label> Definition</label>
                    <input type = 'text' name = 'definition' placeholder = 'Enter the definition' required>

                    <p> Multiple Choice Options for Quiz (optional)</p>
                    <div class = 'options-grid'>
                        <input type = 'text' name = 'option1' placeholder = 'Option 1'>
                        <input type = 'text' name = 'option2' placeholder = 'Option 2'>
                        <input type = 'text' name = 'option3' placeholder = 'Option 3'>
                </div>
            </div>


            <div class = 'form-footer'>
                <button type = 'button' id = 'add-question' class = 'btn-secondary'> + Add Another Question</button>
                <button type = 'submit' class = 'btn-primary'> Create Study Set</button>
            </div>
        </form>
    </div>

</body>
</html>
